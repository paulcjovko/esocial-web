/* ═══════════════════════════════════════════
   DESIGN TOKENS — fiel ao padrão gov.br
═══════════════════════════════════════════ */
const C = {
  green:"#1a7a4a", greenDk:"#155e39", greenLt:"#e8f5ee", greenMid:"#2e9960",
  blue:"#1351b4", blueDk:"#0d3c8a", blueLt:"#dce9f9", bluePale:"#f0f4fb",
  yellow:"#ffcd07", orange:"#e05c00", orangeLt:"#fff3ec",
  red:"#c0392b", redLt:"#fdecea",
  gray:"#555770", grayLt:"#f0f0f5", grayMid:"#e0e0ea", border:"#c5c6d0",
  white:"#fff", text:"#1c1c3a", textLt:"#636578",
  warn:"#856404", warnBg:"#fff3cd", warnBd:"#ffc107",
  govDark:"#071d41",
};

/* ═══════════════════════════════════════════
   ATOMS
═══════════════════════════════════════════ */
const cx = (...classes) => classes.filter(Boolean).join(" ");

function FieldLabel({ children, required }) {
  return (
    <label style={{ display:"block", fontSize:13, fontWeight:600, color:C.gray, marginBottom:5 }}>
      {children}{required && <span style={{ color:C.red }}> *</span>}
    </label>
  );
}

function Input({ label, value, onChange, placeholder, required, error, type="text", disabled, hint, style={} }) {
  const [focus, setFocus] = useState(false);
  return (
    <div style={{ marginBottom:14, ...style }}>
      {label && <FieldLabel required={required}>{label}</FieldLabel>}
      <input
        type={type} value={value} disabled={disabled}
        onChange={e => onChange && onChange(e.target.value)}
        placeholder={placeholder}
        onFocus={() => setFocus(true)}
        onBlur={() => setFocus(false)}
        style={{
          width:"100%", padding:"9px 12px", boxSizing:"border-box",
          border:`1.5px solid ${error ? C.red : focus ? C.blue : C.border}`,
          borderRadius:5, fontSize:13, outline:"none", color:C.text,
          background: disabled ? C.grayLt : C.white,
          cursor: disabled ? "not-allowed" : "text",
        }}
      />
      {hint && !error && <div style={{ fontSize:11, color:C.textLt, marginTop:3 }}>{hint}</div>}
      {error && <div style={{ fontSize:11, color:C.red, marginTop:3 }}>⚠ {error}</div>}
    </div>
  );
}

function Select({ label, value, onChange, options, required, disabled, style={} }) {
  return (
    <div style={{ marginBottom:14, ...style }}>
      {label && <FieldLabel required={required}>{label}</FieldLabel>}
      <select
        value={value} disabled={disabled}
        onChange={e => onChange && onChange(e.target.value)}
        style={{
          width:"100%", padding:"9px 12px",
          border:`1.5px solid ${C.border}`, borderRadius:5,
          fontSize:13, background: disabled ? C.grayLt : C.white,
          color:C.text, outline:"none",
          cursor: disabled ? "not-allowed" : "pointer",
        }}
      >
        {options.map(o => {
          const v = typeof o === "object" ? o.v : o;
          const l = typeof o === "object" ? o.l : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </div>
  );
}

function Btn({ children, onClick, variant="primary", size="md", disabled, style={}, type="button" }) {
  const variants = {
    primary: { bg: C.blue, hov: C.blueDk, col: C.white, bord: "none" },
    green:   { bg: C.green, hov: C.greenDk, col: C.white, bord: "none" },
    danger:  { bg: C.red, hov: "#922b21", col: C.white, bord: "none" },
    ghost:   { bg: "transparent", hov: C.blueLt, col: C.blue, bord: `1.5px solid ${C.blue}` },
    orange:  { bg: C.orange, hov: "#c44f00", col: C.white, bord: "none" },
    gray:    { bg: C.grayLt, hov: C.grayMid, col: C.gray, bord: `1px solid ${C.border}` },
  };
  const pad = { sm:"5px 12px", md:"8px 18px", lg:"11px 26px" }[size];
  const fs = { sm:12, md:13, lg:14 }[size];
  const s = variants[variant] || variants.primary;
  const [hov, setHov] = useState(false);
  return (
    <button
      type={type} disabled={disabled}
      onClick={disabled ? undefined : onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: disabled ? "#ccc" : hov ? s.hov : s.bg,
        color: disabled ? "#888" : s.col, border: s.bord,
        borderRadius:5, padding:pad, fontSize:fs, fontWeight:700,
        cursor: disabled ? "not-allowed" : "pointer",
        display:"inline-flex", alignItems:"center", gap:6,
        transition:"background .15s", ...style,
      }}
    >
      {children}
    </button>
  );
}

function Tag({ children, color="green" }) {
  const map = {
    green: { bg:C.greenLt, c:C.greenDk },
    blue:  { bg:C.blueLt, c:C.blueDk },
    red:   { bg:C.redLt, c:C.red },
    orange:{ bg:C.orangeLt, c:C.orange },
    gray:  { bg:C.grayLt, c:C.gray },
    warn:  { bg:C.warnBg, c:C.warn },
  };
  const s = map[color] || map.green;
  return (
    <span style={{ background:s.bg, color:s.c, padding:"2px 9px", borderRadius:20, fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>
      {children}
    </span>
  );
}

function Alert({ type="info", children, style={} }) {
  const map = {
    info:    { bg:C.blueLt, bd:C.blue, ico:"ℹ️" },
    success: { bg:C.greenLt, bd:C.green, ico:"✅" },
    error:   { bg:C.redLt, bd:C.red, ico:"✕" },
    warn:    { bg:C.warnBg, bd:C.warnBd, ico:"⚠️" },
  };
  const s = map[type] || map.info;
  return (
    <div style={{
      background:s.bg, border:`1px solid ${s.bd}`, borderRadius:6,
      padding:"10px 14px", marginBottom:14,
      display:"flex", gap:9, alignItems:"flex-start", fontSize:13, ...style,
    }}>
      <span style={{ flexShrink:0 }}>{s.ico}</span>
      <div style={{ color:C.text, lineHeight:1.5 }}>{children}</div>
    </div>
  );
}

function SuccessScreen({ title, sub, recibo, onBack, onNew }) {

      <div style={{ fontSize:18, fontWeight:800, color:C.greenDk, marginBottom:6 }}>{title}</div>
      {recibo && (

          Recibo: {recibo}

      <div style={{ color:C.gray, fontSize:13, marginBottom:22 }}>{sub}</div>
      <div style={{ display:"flex", gap:10, justifyContent:"center" }}>

        {onNew && <Btn onClick={onNew} variant="green">+ Novo</Btn>}

}

function RequiredNote() {

function SectionTitle({ children, action }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:`2px solid ${C.green}`, paddingBottom:7, marginBottom:16, marginTop:2 }}>
      <span style={{ fontWeight:800, fontSize:15, color:C.greenDk }}>{children}</span>
      {action}
    </div>
  );
}

function StepBar({ steps, current, onStep }) {
  return (
    <div style={{ display:"flex", marginBottom:20, borderRadius:6, overflow:"hidden", border:`1px solid ${C.border}` }}>
      {steps.map((s, i) => {
        const done = i + 1 < current;
        const active = i + 1 === current;
        return (
          <div key={i}
            onClick={() => (done || active) && onStep && onStep(i + 1)}
            style={{
              flex:1, padding:"10px 14px",
              background: active ? C.blue : done ? C.green : C.grayLt,
              color: active || done ? C.white : C.gray,
              fontWeight:700, fontSize:12, textAlign:"center",
              cursor: (done || active) ? "pointer" : "default",
              borderRight: i < steps.length - 1 ? `1px solid rgba(255,255,255,.3)` : "none",
            }}
          >
            {done ? "✓ " : `${i+1}. `}{s}
          </div>
        );
      })}
    </div>
  );
}

function Breadcrumb({ items }) {
  return (
    <div style={{ fontSize:12, color:C.textLt, marginBottom:16, display:"flex", alignItems:"center", gap:6 }}>
      {items.map((it, i) => (
        <span key={i} style={{ display:"flex", alignItems:"center", gap:6 }}>
          {i > 0 && <span style={{ color:C.border }}>›</span>}
          <span style={{ color: i === items.length - 1 ? C.blue : C.textLt, fontWeight: i === items.length - 1 ? 600 : 400 }}>{it}</span>
        </span>
      ))}
    </div>
  );
}

function DataRow({ label, value }) {
  return (
    <div style={{ padding:"8px 0", borderBottom:`1px solid ${C.grayLt}` }}>
      <div style={{ fontSize:11, color:C.textLt, textTransform:"uppercase", letterSpacing:.3, marginBottom:2 }}>{label}</div>
      <div style={{ fontWeight:600, color:C.text, fontSize:13 }}>{value || <span style={{ color:C.textLt, fontStyle:"italic" }}>—</span>}</div>
    </div>
  );
}

function DataGrid({ rows, cols=2 }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols}, 1fr)`, gap:"0 24px" }}>
      {rows.map(([l, v], i) => <DataRow key={i} label={l} value={v} />)}
    </div>
  );
}

function TableHeader({ cols }) {
  return (
    <thead>
      <tr style={{ background:C.grayLt }}>
        {cols.map(c => (
          <th key={c} style={{ padding:"10px 12px", textAlign:"left", fontSize:11, fontWeight:700, color:C.gray, textTransform:"uppercase", letterSpacing:.4, borderBottom:`1px solid ${C.border}`, whiteSpace:"nowrap" }}>
            {c}
          </th>
        ))}
      </tr>
    </thead>
  );
}

function EmptyState({ icon="📋", msg }) {
  return (
    <div style={{ padding:"32px", textAlign:"center", color:C.textLt }}>
      <div style={{ fontSize:32, marginBottom:8 }}>{icon}</div>
      <div style={{ fontSize:13 }}>{msg}</div>
    </div>
  );
}

function Modal({ title, children, onClose, width=480 }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ background:C.white, borderRadius:8, width:"100%", maxWidth:width, boxShadow:"0 8px 40px rgba(0,0,0,.28)", overflow:"hidden" }}>
        <div style={{ background:C.govDark, padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ color:C.white, fontWeight:700, fontSize:15 }}>{title}</span>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"rgba(255,255,255,.7)", fontSize:20, cursor:"pointer", lineHeight:1 }}>×</button>
        </div>
        <div style={{ padding:"20px" }}>{children}</div>
      </div>
    </div>
  );
}

function LoginPage({ onLogin }) {
  const [cpf, setCpf] = useState("");
  const [step, setStep] = useState(1);
  const [loading, setLoading] = useState(false);
  const [err, setCpfErr] = useState("");

  const fmtCpf = v => {
    v = v.replace(/\D/g,"").slice(0,11);
    if(v.length>9) v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,"$1.$2.$3-$4");
    else if(v.length>6) v=v.replace(/(\d{3})(\d{3})(\d{3})/,"$1.$2.$3");
    else if(v.length>3) v=v.replace(/(\d{3})(\d{3})/,"$1.$2");
    return v;
  };

  const doLogin = () => {
    setLoading(true);
    setTimeout(() => onLogin(), 2000);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.grayLt, fontFamily:"'Rawline',Calibri,sans-serif" }}>
      {/* Gov bar */}
      <div style={{ background:C.govDark, padding:"5px 24px", display:"flex", alignItems:"center", gap:16, fontSize:11 }}>
        <span style={{ color:"rgba(255,255,255,.85)" }}>🇧🇷 Governo Federal</span>
        <span style={{ color:"rgba(255,255,255,.3)" }}>|</span>
        <span style={{ color:"rgba(255,255,255,.7)" }}>Acesso à Informação</span>
        <span style={{ color:"rgba(255,255,255,.3)" }}>|</span>
        <span style={{ color:"rgba(255,255,255,.7)" }}>Participe</span>
      </div>

      {/* Blue header */}
      <div style={{ background:C.blue, padding:"14px 28px", display:"flex", alignItems:"center", gap:14 }}>
        <div style={{ background:C.yellow, borderRadius:4, padding:"5px 11px", fontWeight:900, fontSize:17, color:C.blueDk, letterSpacing:.5 }}>GOV.BR</div>
        <div style={{ width:1, height:32, background:"rgba(255,255,255,.25)" }}/>
        <div>
          <div style={{ fontSize:10, color:"rgba(255,255,255,.7)" }}>Portal Único de Acesso ao Governo Federal</div>
          <div style={{ fontSize:15, fontWeight:700, color:C.white }}>Entrar com gov.br</div>
        </div>
      </div>

      <div style={{ display:"flex", justifyContent:"center", padding:"44px 16px" }}>
        <div style={{ background:C.white, borderRadius:8, boxShadow:"0 2px 24px rgba(0,0,0,.13)", width:"100%", maxWidth:430, overflow:"hidden" }}>

          {/* eSocial brand */}
          <div style={{ background:C.green, padding:"22px 28px", textAlign:"center" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, marginBottom:6 }}>
              <div style={{ background:C.white, borderRadius:5, padding:"3px 9px", fontWeight:900, fontSize:22, color:C.green, lineHeight:1 }}>e</div>
              <span style={{ color:C.white, fontWeight:800, fontSize:24, letterSpacing:.5 }}>Social</span>
            </div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.8)", lineHeight:1.4 }}>
              Sistema de Escrituração Digital das Obrigações<br/>Fiscais, Previdenciárias e Trabalhistas
            </div>
          </div>

          <div style={{ padding:"28px" }}>
            <Alert type="info">
              <strong>Atenção:</strong> O código de acesso foi extinto em 2023. Use apenas <strong>gov.br</strong> (nível prata ou ouro) ou <strong>certificado digital</strong>.
            </Alert>

            {loading ? (
              <div style={{ textAlign:"center", padding:"24px 0" }}>
                <div style={{ fontSize:40, marginBottom:12 }}>🔐</div>
                <div style={{ color:C.blue, fontWeight:700, fontSize:14, marginBottom:12 }}>Autenticando via gov.br…</div>
                <div style={{ background:C.grayMid, borderRadius:4, height:6, overflow:"hidden" }}>
                  <div style={{ background:C.blue, height:"100%", borderRadius:4, animation:"load 1.8s ease-in-out infinite" }}/>
                </div>
                <div style={{ fontSize:11, color:C.textLt, marginTop:8 }}>Aguarde, não feche esta janela.</div>
              </div>
            ) : step === 1 ? (
              <>
                <h2 style={{ margin:"0 0 6px", fontSize:17, fontWeight:800, color:C.text }}>Informe seu CPF</h2>
                <p style={{ margin:"0 0 18px", fontSize:12, color:C.textLt }}>Para acessar o eSocial Web Geral</p>
                <Input
                  label="CPF" value={cpf}
                  onChange={v => { setCpf(fmtCpf(v)); setCpfErr(""); }}
                  placeholder="000.000.000-00"
                  error={err}
                  hint="Informe o CPF do responsável pelo empregador"
                />
                <Btn
                  onClick={() => {
                    if(cpf.replace(/\D/g,"").length !== 11) { setCpfErr("CPF inválido. Informe todos os 11 dígitos."); return; }
                    setStep(2);
                  }}
                  style={{ width:"100%", justifyContent:"center", marginTop:4 }}
                  size="lg"
                >
                  Continuar →
                </Btn>
              </>
            ) : (
              <>
                <h2 style={{ margin:"0 0 4px", fontSize:16, fontWeight:800, color:C.text }}>Escolha como entrar</h2>
                <p style={{ margin:"0 0 16px", fontSize:12, color:C.textLt }}>
                  CPF: <strong>{cpf}</strong>
                  <button onClick={() => setStep(1)} style={{ background:"none", border:"none", color:C.blue, cursor:"pointer", fontSize:11, marginLeft:8 }}>Alterar</button>
                </p>
                {[
                  { icon:"🔒", l:"Senha do gov.br", d:"Nível prata ou ouro — acesso padrão", tag:"RECOMENDADO" },
                  { icon:"📱", l:"Reconhecimento Facial", d:"Pelo aplicativo gov.br", tag:"" },
                  { icon:"💳", l:"Certificado Digital", d:"Token A3 ou arquivo A1", tag:"" },
                  { icon:"🏦", l:"Validação Bancária", d:"Internet banking credenciado", tag:"" },
                ].map(m => (
                  <button key={m.l} onClick={doLogin}
                    style={{ width:"100%", background:C.white, border:`1.5px solid ${C.border}`, borderRadius:7, padding:"12px 14px", marginBottom:9, cursor:"pointer", display:"flex", alignItems:"center", gap:12, textAlign:"left", transition:"all .15s" }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor=C.blue; e.currentTarget.style.background=C.blueLt; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor=C.border; e.currentTarget.style.background=C.white; }}
                  >
                    <span style={{ fontSize:22 }}>{m.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700, fontSize:13, color:C.text, display:"flex", alignItems:"center", gap:7 }}>
                        {m.l}
                        {m.tag && <Tag color="green">{m.tag}</Tag>}
                      </div>
                      <div style={{ fontSize:11, color:C.textLt }}>{m.d}</div>
                    </div>
                    <span style={{ color:C.border, fontSize:18 }}>›</span>
                  </button>
                ))}
              </>
            )}
          </div>
        </div>
      </div>
      <style>{`@keyframes load { 0%{width:15%} 50%{width:85%} 100%{width:15%} }`}</style>
    </div>
  );
}

      {perfis.map(p => (
        <button key={p.id} onClick={() => onSelect(p.id)}
          style={{
            width:"100%", padding:"13px 16px", marginBottom:8,
            border:`2px solid ${current===p.id ? C.green : C.border}`,
            background: current===p.id ? C.greenLt : C.white,
            borderRadius:7, cursor:"pointer",
            display:"flex", alignItems:"center", gap:12, textAlign:"left",
            transition:"all .15s",
          }}
          onMouseEnter={e => { if(current!==p.id){ e.currentTarget.style.borderColor=C.blue; e.currentTarget.style.background=C.blueLt; }}}
          onMouseLeave={e => { if(current!==p.id){ e.currentTarget.style.borderColor=C.border; e.currentTarget.style.background=C.white; }}}
        >
          <span style={{ fontSize:26 }}>{p.icon}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, color:C.text, fontSize:13 }}>{p.id}</div>
            <div style={{ fontSize:11, color:C.textLt }}>{p.desc}</div>
          </div>
          {current===p.id && <span style={{ color:C.green, fontSize:18, fontWeight:900 }}>✓</span>}
        </button>
      ))}
    </Modal>
  );
}

/* ═══════════════════════════════════════════
   GESTÃO DE EMPREGADOS

function GestaoEmpregados({ employees, setActive, setCtxEmp, setCtxEvent }) {
  const [q, setQ] = useState("");
  const [selected, setSelected] = useState(null);
  const [tab, setTab] = useState("cadastrais");

  const found = employees.filter(e =>
    e.nome.toLowerCase().includes(q.toLowerCase()) ||
    e.cpf.includes(q) || e.matricula.includes(q)
  );
  const emp = selected ? employees.find(e => e.id === selected) : null;
  const TABS = ["Dados Cadastrais","Dados Contratuais","Afastamentos","Desligamento","Movimentações Trabalhistas"];

  const handleEvent = (ev) => {
    setCtxEmp(emp);
    setActive(ev);
  };

  return (
    <div>
      <SectionTitle>Gestão de Empregados</SectionTitle>
      <Alert type="info">
        Empregadores com até 12 trabalhadores: informe parte do CPF ou nome. Acima de 12: informe o CPF completo.
      </Alert>

      <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:7, padding:"16px", marginBottom:14 }}>
        <div style={{ display:"flex", gap:10, alignItems:"flex-end" }}>
          <Input label="Buscar por CPF, nome ou matrícula"
            value={q} onChange={setQ}
            placeholder="Digite CPF parcial, nome ou matrícula"
            style={{ flex:1, marginBottom:0 }}
          />
          <Btn size="md" style={{ marginBottom:0, height:37 }}>🔍 Consultar</Btn>
        </div>
      </div>

      {!emp ? (
        <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:7, overflow:"hidden" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <TableHeader cols={["CPF","Nome","Matrícula","Cargo","Situação","Ações"]}/>
            <tbody>
              {found.length === 0 ? (
                <tr><td colSpan={6}><EmptyState msg="Nenhum empregado encontrado. Refine a busca."/></td></tr>
              ) : found.map((e, i) => (
                <tr key={e.id} style={{ borderBottom: i < found.length-1 ? `1px solid ${C.grayLt}` : "none" }}
                  onMouseEnter={el => el.currentTarget.style.background=C.grayLt}
                  onMouseLeave={el => el.currentTarget.style.background="transparent"}
                >
                  <td style={{ padding:"11px 12px", fontFamily:"monospace", fontSize:12, color:C.textLt }}>{e.cpf}</td>
                  <td style={{ padding:"11px 12px", fontWeight:600, color:C.text, fontSize:13 }}>{e.nome}</td>
                  <td style={{ padding:"11px 12px", fontSize:12, color:C.gray }}>{e.matricula}</td>
                  <td style={{ padding:"11px 12px", fontSize:12, color:C.gray }}>{e.cargo}</td>
                  <td style={{ padding:"11px 12px" }}><Tag color="green">{e.status}</Tag></td>
                  <td style={{ padding:"11px 12px" }}>
                    <div style={{ display:"flex", gap:5 }}>
                      <button onClick={() => setSelected(e.id)}
                        style={{ background:C.blueLt, color:C.blue, border:`1px solid ${C.blue}`, borderRadius:4, padding:"3px 9px", fontSize:11, cursor:"pointer", fontWeight:600 }}>
                        Visualizar
                      </button>
                      <button onClick={() => { setCtxEmp(e); setActive("s2206"); }}
                        style={{ background:C.greenLt, color:C.green, border:`1px solid ${C.green}`, borderRadius:4, padding:"3px 9px", fontSize:11, cursor:"pointer", fontWeight:600 }}>
                        Alterar
                      </button>
                      <button onClick={() => { setCtxEmp(e); setActive("s2230"); }}
                        style={{ background:C.orangeLt, color:C.orange, border:`1px solid ${C.orange}`, borderRadius:4, padding:"3px 9px", fontSize:11, cursor:"pointer", fontWeight:600 }}>
                        Afastar
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : (
        <div>
          <button onClick={() => setSelected(null)} style={{ background:"none", border:"none", color:C.blue, cursor:"pointer", fontSize:13, marginBottom:12, display:"flex", alignItems:"center", gap:4 }}>
            ← Voltar à lista
          </button>

          <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:8, overflow:"hidden" }}>
            {/* Employee header */}
            <div style={{ background:`linear-gradient(135deg, ${C.greenDk}, ${C.green})`, padding:"16px 20px", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div style={{ fontWeight:800, fontSize:16, color:C.white }}>{emp.nome}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,.8)", marginTop:2 }}>
                  CPF: {emp.cpf} &nbsp;|&nbsp; Matrícula: {emp.matricula} &nbsp;|&nbsp; Admissão: {emp.admissao}
                </div>
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", justifyContent:"flex-end" }}>
                <Btn size="sm" onClick={() => handleEvent("s2205")} style={{ background:"rgba(255,255,255,.2)", border:"1px solid rgba(255,255,255,.4)", color:C.white }}>Alt. Cadastro</Btn>
                <Btn size="sm" onClick={() => handleEvent("s2206")} style={{ background:"rgba(255,255,255,.2)", border:"1px solid rgba(255,255,255,.4)", color:C.white }}>Alt. Contrato</Btn>
                <Btn size="sm" onClick={() => handleEvent("s2230")} style={{ background:"rgba(255,255,255,.2)", border:"1px solid rgba(255,255,255,.4)", color:C.white }}>Afastar</Btn>
                <Btn size="sm" onClick={() => handleEvent("s2299")} style={{ background:"rgba(255,30,30,.3)", border:"1px solid rgba(255,100,100,.5)", color:C.white }}>Desligar</Btn>
              </div>
            </div>

            {/* Tabs */}
            <div style={{ display:"flex", borderBottom:`1px solid ${C.border}`, overflowX:"auto" }}>
              {TABS.map(t => {
                const key = t.toLowerCase().replace(/ /g,"");
                const active = tab === key;
                return (
                  <button key={t} onClick={() => setTab(key)}
                    style={{
                      padding:"11px 16px", border:"none", background:"transparent",
                      color: active ? C.blue : C.gray,
                      borderBottom: active ? `2px solid ${C.blue}` : "2px solid transparent",
                      cursor:"pointer", fontSize:12, fontWeight: active ? 700 : 400,
                      whiteSpace:"nowrap",
                    }}
                  >{t}</button>
                );
              })}
            </div>

            <div style={{ padding:"18px" }}>
              {tab === "dadoscadastrais" && (
                <DataGrid rows={[
                  ["Nome completo", emp.nome], ["CPF", emp.cpf], ["NIS/PIS", emp.nis],
                  ["Data de nascimento", emp.nascimento], ["Nome da mãe", emp.mae],
                  ["Sexo", emp.sexo==="F"?"Feminino":"Masculino"],
                  ["Grau de instrução", "Ensino médio completo"], ["Endereço", "—"],
                ]} />
              )}
              {tab === "dadoscontratuais" && (
                <DataGrid rows={[
                  ["Cargo / Função", emp.cargo], ["CBO", emp.cbo],
                  ["Data de admissão", emp.admissao], ["Salário base", `R$ ${emp.salario.toFixed(2).replace(".",",")}`],
                  ["Jornada", `${emp.jornada}h semanais`], ["Regime", emp.regime],
                  ["Lotação tributária", emp.lotacao], ["Categoria", `${emp.categoria} – Empregado`],
                  ["Tipo de admissão", "1 – Admissão"], ["Matrícula", emp.matricula],
                ]} />
              )}
              {tab === "afastamentos" && <EmptyState icon="🏖️" msg="Nenhum afastamento registrado para este empregado."/>}
              {tab === "desligamento" && <EmptyState icon="📋" msg="Empregado ativo. Sem registro de desligamento."/>}
              {tab === "movimentaçõestrabalhistas" && (
                <div>
                  <div style={{ marginBottom:12, display:"flex", justifyContent:"flex-end" }}>
                    <Btn size="sm" variant="ghost">📥 Baixar XML</Btn>
                  </div>
                  <table style={{ width:"100%", borderCollapse:"collapse" }}>
                    <TableHeader cols={["Evento","Descrição","Data/Hora","Nº Recibo","Situação","Ações"]}/>
                    <tbody>
                      {emp.movimentacoes.map((m, i) => (
                        <tr key={i} style={{ borderBottom: i < emp.movimentacoes.length-1 ? `1px solid ${C.grayLt}` : "none" }}>

  const totalV = rubricas.filter(r=>r.tipo==="V").reduce((s,r)=>s+(parseFloat(r.valor.replace(",","."))||0),0);
  const totalD = rubricas.filter(r=>r.tipo==="D").reduce((s,r)=>s+(parseFloat(r.valor.replace(",","."))||0),0);

  if(ok) return <SuccessScreen title="Remuneração registrada!" recibo={rec} sub="Evento S-1200 transmitido. Totalizadores S-5001, S-5002, S-5003 gerados automaticamente." onBack={() => { setOk(false); setRubricas([{codigo:"",descricao:"",tipo:"V",valor:""}]); }}/>;

        {rubricas.map((r, i) => (
          <div key={i} style={{ display:"grid", gridTemplateColumns:"120px 1fr 120px 120px", gap:"0 10px", marginBottom:6, alignItems:"start" }}>

function Totalizadores({ employees, pageId }) {
  const labels = {
    s5001:"S-5001 – Contribuições Previdenciárias (CP) por Trabalhador",
    s5002:"S-5002 – Imposto de Renda Retido (IRRF) por Trabalhador",

  const [cpf, setCpf] = useState("");

    if(sal<=1518) return sal*0.075;
    if(sal<=2594.92) return sal*0.09;
    if(sal<=3856.94) return sal*0.12;
    return sal*0.14;

  const found = employees.filter(e => !cpf || e.cpf.includes(cpf));

  return (

          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <TableHeader cols={["Trabalhador","CPF","Salário Contribuição","Alíquota","INSS Trabalhador","INSS Patronal"]}/>
            <tbody>
              {found.map((e,i) => {
                const inss = calcINSS(e.salario);
                const aliq = e.salario<=1518?"7,5%":e.salario<=2594.92?"9,0%":e.salario<=3856.94?"12,0%":"14,0%";
                const patron = e.salario*0.08;

                  <tr key={e.id} style={{ borderBottom: i<found.length-1 ? `1px solid ${C.grayLt}` : "none" }}>

                    <td style={{ padding:"11px 12px" }}><Tag color="blue">{aliq}</Tag></td>
                    <td style={{ padding:"11px 12px", fontSize:13, color:C.red, fontWeight:600 }}>R$ {inss.toFixed(2).replace(".",",")}</td>
                    <td style={{ padding:"11px 12px", fontSize:13, color:C.orange, fontWeight:600 }}>R$ {patron.toFixed(2).replace(".",",")}</td>

          </table>
        )}
        {pageId === "s5003" && (
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <TableHeader cols={["Trabalhador","CPF","Base FGTS","Alíquota","FGTS Mensal"]}/>
            <tbody>
              {found.map((e,i) => (
                <tr key={e.id} style={{ borderBottom: i<found.length-1 ? `1px solid ${C.grayLt}` : "none" }}>
                  <td style={{ padding:"11px 12px", fontWeight:600, fontSize:13, color:C.text }}>{e.nome}</td>

          <div style={{ padding:"24px" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14 }}>
              {pageId==="s5002" && found.map(e => (
                <div key={e.id} style={{ background:C.grayLt, borderRadius:6, padding:"14px" }}>

                  <div style={{ fontSize:12, color:C.textLt }}>Rendimentos tributáveis: <strong>R$ {e.salario.toFixed(2).replace(".",",")}</strong></div>
                  <div style={{ fontSize:12, color:C.textLt }}>IRRF retido: <strong style={{ color:C.red }}>R$ 0,00</strong></div>

export default function App() {

  useEffect(() => {
    if(!loggedIn) return;
    const interval = setInterval(() => setIdleMin(m => m > 0 ? m - 1 : 15), 60000);
    const reset = () => setIdleMin(15);
    window.addEventListener("mousemove", reset);
    window.addEventListener("keydown", reset);
    return () => { clearInterval(interval); window.removeEventListener("mousemove",reset); window.removeEventListener("keydown",reset); };
  }, [loggedIn]);

  const toggleGroup = id => setOpenGroups(g => g.includes(id) ? g.filter(x=>x!==id) : [...g,id]);

  const handleModulo = m => {
    setModulo(m);
    setShowTrocar(false);
    setActive("dashboard");
    if(m==="SST") setOpenGroups(["sst-trabalhadores"]);
    else setOpenGroups(["empregador","empregados"]);
  };

  const empNome = employees.length > 0 ? "Empregador Simulado (Demo)" : "—";

  if(!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)}/>;

  // Page router
  const renderPage = () => {
    if(active === "dashboard") return <Dashboard employees={employees} modulo={modulo} setActive={setActive}/>;
    if(active === "s1000" || active === "sst-s1000") return <S1000 blocked={blocked}/>;
    if(active === "gestao-emp" || active === "sst-gestao-emp") return <GestaoEmpregados employees={employees} setActive={setActive} setCtxEmp={setCtxEmp}/>;
    if(active === "s2190") return <GenericEventPage eventCode="S-2190" title="Admissão Preliminar" desc="Pré-cadastro para trabalhadores com documentação incompleta no momento da admissão. Não gera vínculo efetivo." fields={[{key:"cpf",label:"CPF",ph:"000.000.000-00",req:true},{key:"dtAdmProv",label:"Data de admissão provisória",ph:"DD/MM/AAAA",req:true},{key:"nome",label:"Nome do trabalhador",ph:"Nome completo",req:true,full:true}]}/>;
    if(active === "s2200") return <S2200 employees={employees} setEmployees={setEmployees} ctxEmp={ctxEmp}/>;
    if(active === "s2205") return <S2205 employees={employees} setEmployees={setEmployees} ctxEmp={ctxEmp}/>;
    if(active === "s2206") return <S2206 employees={employees} setEmployees={setEmployees} ctxEmp={ctxEmp}/>;
    if(active === "s2230") return <S2230 employees={employees} setEmployees={setEmployees} ctxEmp={ctxEmp}/>;
    if(active === "s2231") return <GenericEventPage eventCode="S-2231" title="Cessão/Exercício em Outro Órgão" desc="Registra cessão de servidor público para exercício em outro órgão." fields={[{key:"cpf",label:"CPF do servidor",ph:"000.000.000-00",req:true},{key:"orgaoDestino",label:"Órgão de destino (CNPJ)",ph:"00.000.000/0000-00",req:true},{key:"dtInicio",label:"Data de início da cessão",ph:"DD/MM/AAAA",req:true},{key:"motivo",label:"Motivo / Portaria",ph:"Ex: Portaria nº 123/2026"}]}/>;
    if(active === "s2298") return <GenericEventPage eventCode="S-2298" title="Reintegração" desc="Registra reintegração por decisão judicial ou administrativa." fields={[{key:"cpf",label:"CPF do trabalhador",ph:"000.000.000-00",req:true},{key:"dtReinteg",label:"Data de reintegração",ph:"DD/MM/AAAA",req:true},{key:"tipo",label:"Tipo",options:[{v:"",l:"Selecione..."},{v:"1",l:"1 – Decisão judicial"},{v:"2",l:"2 – Decisão administrativa"},{v:"3",l:"3 – Outros provimentos"}],req:true},{key:"processo",label:"Nº do processo",ph:"Ex: 0001234-12.2026.5.02.0001"}]}/>;
    if(active === "s2299") return <S2299 employees={employees} setEmployees={setEmployees} ctxEmp={ctxEmp}/>;
    if(active === "gestao-tsve" || active === "sst-gestao-tsve") return <GenericEventPage eventCode="TSVE" title="Gestão de Trabalhadores Sem Vínculo" desc="Busca trabalhadores sem vínculo empregatício (cedidos, temporários). Regra: até 12 trabalhadores, CPF parcial; acima, CPF completo." fields={[{key:"cpf",label:"CPF (parcial ou completo)",ph:"000.000.000-00"}]}/>;
    if(active === "s2300") return <GenericEventPage eventCode="S-2300" title="Trabalhador Sem Vínculo – Início" desc="Inicia contrato de trabalhador cedido (TSVE). Enviado pelo órgão destino (cessionário)." fields={[{key:"cpf",label:"CPF do trabalhador",ph:"000.000.000-00",req:true},{key:"nome",label:"Nome",ph:"Nome completo",req:true,full:true},{key:"dtInicio",label:"Data de início",ph:"DD/MM/AAAA",req:true},{key:"cnpjCedente",label:"CNPJ do órgão cedente",ph:"00.000.000/0000-00",req:true},{key:"remuneracao",label:"Remuneração (R$)",ph:"Ex: 3.500,00",req:true},{key:"cargo",label:"Cargo cedido",ph:"Ex: Analista de Sistemas"}]}/>;
    if(active === "s2306") return <GenericEventPage eventCode="S-2306" title="Alteração Contratual TSVE" desc="Corrige dados contratuais do trabalhador sem vínculo." fields={[{key:"cpf",label:"CPF do trabalhador",ph:"000.000.000-00",req:true},{key:"dtAlteracao",label:"Data da alteração",ph:"DD/MM/AAAA",req:true},{key:"novoSalario",label:"Nova remuneração (R$)",ph:"Ex: 4.000,00"},{key:"novaLotacao",label:"Nova lotação",ph:"Ex: L-002"}]}/>;
    if(active === "s2399") return <GenericEventPage eventCode="S-2399" title="Trabalhador Sem Vínculo – Término" desc="Encerra contrato do trabalhador cedido." fields={[{key:"cpf",label:"CPF do trabalhador",ph:"000.000.000-00",req:true},{key:"dtFim",label:"Data do término",ph:"DD/MM/AAAA",req:true},{key:"motivo",label:"Motivo do término",options:[{v:"",l:"Selecione..."},{v:"10",l:"10 – Término do contrato"},{v:"11",l:"11 – Rescisão antecipada"},{v:"99",l:"99 – Outros"}],req:true}]}/>;
    if(active === "s2210") return <S2210 employees={employees}/>;
    if(active === "s2220" || active === "sst-s2220-tsve") return <S2220 employees={employees}/>;
    if(active === "s2240" || active === "sst-s2240-tsve") return <S2240 employees={employees}/>;
    if(active === "gestao-folha") return <GestaoFolha employees={employees} setActive={setActive}/>;
    if(active === "s1200" || active === "s1202") return <S1200 employees={employees}/>;
    if(active === "s1207") return <GenericEventPage eventCode="S-1207" title="Benefícios – Entes Públicos" desc="Informa pagamento de benefícios previdenciários (aposentadorias, pensões) de servidores." fields={[{key:"cpf",label:"CPF do beneficiário",ph:"000.000.000-00",req:true},{key:"comp",label:"Competência",ph:"MM/AAAA",req:true},{key:"tipo",label:"Tipo de benefício",options:[{v:"",l:"Selecione..."},{v:"01",l:"01 – Aposentadoria"},{v:"02",l:"02 – Pensão por morte"},{v:"03",l:"03 – Auxílio-reclusão"}],req:true},{key:"valor",label:"Valor (R$)",ph:"0,00",req:true}]}/>;
    if(active === "s1210") return <GenericEventPage eventCode="S-1210" title="Pagamentos de Rendimentos" desc="Informa pagamentos avulsos (13º salário, adiantamentos, etc.)." fields={[{key:"cpf",label:"CPF do trabalhador",ph:"000.000.000-00",req:true},{key:"comp",label:"Competência",ph:"MM/AAAA",req:true},{key:"tipo",label:"Tipo de rendimento",options:[{v:"",l:"Selecione..."},{v:"13",l:"13º Salário"},{v:"12",l:"Adiantamento"},{v:"99",l:"Outros"}],req:true},{key:"valor",label:"Valor bruto (R$)",ph:"0,00",req:true}]}/>;
    if(active === "s1260") return <GenericEventPage eventCode="S-1260" title="Produção Rural – Pessoa Física" desc="Comercialização de produção rural por pessoa física." fields={[{key:"cpf",label:"CPF do produtor",ph:"000.000.000-00",req:true},{key:"comp",label:"Competência",ph:"MM/AAAA",req:true},{key:"valor",label:"Valor bruto produção (R$)",ph:"0,00",req:true},{key:"cnpjAdq",label:"CNPJ do adquirente",ph:"00.000.000/0000-00"}]}/>;
    if(active === "s1270") return <GenericEventPage eventCode="S-1270" title="Contratação de Avulsos Não Portuários" desc="Registra pagamento de trabalhadores avulsos não portuários." fields={[{key:"cpf",label:"CPF do trabalhador avulso",ph:"000.000.000-00",req:true},{key:"comp",label:"Competência",ph:"MM/AAAA",req:true},{key:"lotacao",label:"Lotação tributária",ph:"Ex: L-001",req:true},{key:"valor",label:"Valor pago (R$)",ph:"0,00",req:true}]}/>;
    if(active === "s1280") return <GenericEventPage eventCode="S-1280" title="Informações Complementares" desc="Ajustes de eventos periódicos (decisões judiciais, variações salariais retroativas)." fields={[{key:"comp",label:"Competência afetada",ph:"MM/AAAA",req:true},{key:"tipo",label:"Tipo",options:[{v:"",l:"Selecione..."},{v:"01",l:"01 – Decisão judicial"},{v:"02",l:"02 – Retroativo voluntário"}],req:true},{key:"desc",label:"Descrição",ph:"Descreva o complemento",req:true,full:true}]}/>;
    if(active === "s1298") return <S1298/>;
    if(active === "s1299") return <S1299 employees={employees}/>;
    if(active === "s2400") return <GenericEventPage eventCode="S-2400" title="Cadastro de Beneficiário – Início" desc="Inicia cadastro de beneficiário de previdência (pensão/aposentadoria) em entes públicos." fields={[{key:"cpf",label:"CPF do beneficiário",ph:"000.000.000-00",req:true},{key:"nome",label:"Nome",ph:"Nome completo",req:true,full:true},{key:"nascimento",label:"Data de nascimento",ph:"DD/MM/AAAA",req:true},{key:"tipo",label:"Tipo de benefício",options:[{v:"",l:"Selecione..."},{v:"01",l:"01 – Aposentadoria"},{v:"02",l:"02 – Pensão por morte"},{v:"03",l:"03 – Auxílio-reclusão"}],req:true},{key:"dtInicio",label:"Data de início",ph:"DD/MM/AAAA",req:true}]}/>;
    if(active === "s2405") return <GenericEventPage eventCode="S-2405" title="Alt. Cadastral Beneficiário" fields={[{key:"cpf",label:"CPF",ph:"000.000.000-00",req:true},{key:"nome",label:"Novo nome (se alterado)",ph:"Nome completo"},{key:"nascimento",label:"Data de nascimento corrigida",ph:"DD/MM/AAAA"},{key:"endereco",label:"Novo endereço",ph:"Rua, nº, bairro, CEP",full:true}]}/>;
    if(active === "s2410") return <GenericEventPage eventCode="S-2410" title="Cadastro de Benefício – Início" fields={[{key:"cpf",label:"CPF do beneficiário",ph:"000.000.000-00",req:true},{key:"tipo",label:"Tipo",options:[{v:"",l:"Selecione..."},{v:"01",l:"01 – Aposentadoria"},{v:"02",l:"02 – Pensão por morte"}],req:true},{key:"dtConcessao",label:"Data de concessão",ph:"DD/MM/AAAA",req:true},{key:"valor",label:"Valor mensal (R$)",ph:"0,00",req:true}]}/>;
    if(active === "s2416") return <GenericEventPage eventCode="S-2416" title="Alteração de Benefício" fields={[{key:"cpf",label:"CPF do beneficiário",ph:"000.000.000-00",req:true},{key:"novoValor",label:"Novo valor (R$)",ph:"0,00",req:true},{key:"dtAlteracao",label:"Data de eficácia",ph:"DD/MM/AAAA",req:true},{key:"motivo",label:"Motivo da alteração",ph:"Ex: Reajuste anual",full:true}]}/>;
    if(active === "s2418") return <GenericEventPage eventCode="S-2418" title="Reativação de Benefício" desc="Reativa benefício cessado por erro ou decisão posterior." fields={[{key:"cpf",label:"CPF do beneficiário",ph:"000.000.000-00",req:true},{key:"dtReativacao",label:"Data de reativação",ph:"DD/MM/AAAA",req:true},{key:"motivo",label:"Motivo",ph:"Descreva o motivo da reativação",full:true}]}/>;
    if(active === "s2420") return <GenericEventPage eventCode="S-2420" title="Término de Benefício" desc="Encerra benefício por óbito, revisão ou decisão administrativa." fields={[{key:"cpf",label:"CPF do beneficiário",ph:"000.000.000-00",req:true},{key:"dtFim",label:"Data de cessação",ph:"DD/MM/AAAA",req:true},{key:"motivo",label:"Motivo de cessação",options:[{v:"",l:"Selecione..."},{v:"01",l:"01 – Óbito"},{v:"02",l:"02 – Revisão administrativa"},{v:"03",l:"03 – Decisão judicial"},{v:"04",l:"04 – Concessão de outro benefício"}],req:true}]}/>;
    if(active === "s5001" || active === "s5002" || active === "s5003" || active === "s5011" || active === "s5013")
      return <Totalizadores employees={employees} pageId={active}/>;
    if(active === "dl-solicitar" || active === "dl-consultar")
      return <Downloads pageId={active} employees={employees}/>;

    // Generic tabela pages
    const tabelas = {
      s1005: ["S-1005","Estabelecimentos / Obras / Unidades","Cadastra matrizes, filiais e obras. Deve ser enviado antes das remunerações.",[{key:"cnpj",label:"CNPJ/CNO",ph:"00.000.000/0000-00",req:true},{key:"tipo",label:"Tipo",options:[{v:"",l:"Selecione..."},{v:"1",l:"1 – Matriz"},{v:"2",l:"2 – Filial"},{v:"3",l:"3 – Obra (CNO)"}],req:true},{key:"cnae",label:"CNAE",ph:"Ex: 9700-5/00",req:true},{key:"fap",label:"FAP/GILRAT",ph:"Ex: 1,0000"},{key:"dtInicio",label:"Data de início de validade",ph:"DD/MM/AAAA",req:true}]],
      s1010: ["S-1010","Tabela de Rubricas","Cadastra codificação interna de verbas salariais (incidências CP, IRRF, FGTS).",[{key:"codigo",label:"Código da rubrica",ph:"Ex: 0001",req:true},{key:"desc",label:"Descrição",ph:"Ex: Salário Base",req:true,full:true},{key:"classe",label:"Classe",options:[{v:"",l:"Selecione..."},{v:"1",l:"1 – Vencimento/Salário"},{v:"2",l:"2 – Desconto"},{v:"3",l:"3 – Informativo"},{v:"4",l:"4 – Informativo dedutor"}],req:true},{key:"incCP",label:"Incidência CP",options:[{v:"11",l:"11 – Integralmente"},{v:"12",l:"12 – Parcialmente"},{v:"00",l:"00 – Não incide"}]},{key:"incFGTS",label:"Incidência FGTS",options:[{v:"11",l:"11 – Integralmente"},{v:"12",l:"12 – Parcialmente"},{v:"00",l:"00 – Não incide"}]},{key:"incIR",label:"Incidência IRRF",options:[{v:"11",l:"11 – Integralmente"},{v:"12",l:"12 – Parcialmente"},{v:"00",l:"00 – Não incide"}]}]],
      s1020: ["S-1020","Tabela de Lotações Tributárias","Cadastra classificação tributária por unidade. Enviar antes de S-1200.",[{key:"codigo",label:"Código de lotação",ph:"Ex: L-001",req:true},{key:"desc",label:"Descrição",ph:"Ex: Sede Principal",req:true},{key:"fpas",label:"FPAS",ph:"Ex: 515",req:true},{key:"natureza",label:"Natureza",options:[{v:"01",l:"01 – Empresa (Atividade Principal)"},{v:"02",l:"02 – Obra de Construção Civil"},{v:"03",l:"03 – Atividade de Terceiros"}],req:true}]],
      s1070: ["S-1070","Processos Administrativos/Judiciais","Registra processos que podem reduzir contribuições previdenciárias.",[{key:"numero",label:"Número do processo",ph:"Ex: 0001234-12.2026.5.02.0001",req:true},{key:"tipo",label:"Tipo",options:[{v:"1",l:"1 – Administrativo (PA)"},{v:"2",l:"2 – Judicial (PJ)"}],req:true},{key:"dtInicio",label:"Data de início",ph:"DD/MM/AAAA",req:true},{key:"participante",label:"Vara/Seção",ph:"Ex: 2ª Vara do Trabalho de SP"},{key:"percAfetado",label:"Percentual afetado (%)",ph:"Ex: 50"}]],
    };
    if(tabelas[active]) {
      const [code, ttl, dsc, flds] = tabelas[active];
      return <GenericEventPage eventCode={code} title={ttl} desc={dsc} fields={flds}/>;
    }

    return (
      <div style={{ textAlign:"center", padding:"60px 24px", color:C.textLt }}>
        <div style={{ fontSize:42, marginBottom:10 }}>🚧</div>
        <div style={{ fontSize:16, fontWeight:700, color:C.text, marginBottom:6 }}>Seção em desenvolvimento</div>
        <div style={{ fontSize:13 }}>Esta tela está sendo preparada. No sistema real, esta funcionalidade está disponível.</div>
      </div>
    );
  };

  // Derive breadcrumb from active page
  const getBreadcrumb = () => {
    for(const g of (modulo==="SST" ? MENU_SST : MENU_WEB_GERAL)) {
      const sub = g.sub?.find(s => s.id === active);
      if(sub) return ["eSocial", g.label, sub.label];
    }
    return ["eSocial", active === "dashboard" ? "Painel" : active];
  };

  return (
    <div style={{ minHeight:"100vh", background:C.grayLt, fontFamily:"'Rawline',Calibri,sans-serif", fontSize:14, color:C.text }}>
      <Header
        modulo={modulo}
        empregador={empNome}
        onTrocar={() => setShowTrocar(true)}
        onLogout={() => { setLoggedIn(false); setActive("dashboard"); }}
        idleMin={idleMin}
      />

      {showTrocar && <TrocarPerfilModal current={modulo} onSelect={handleModulo} onClose={() => setShowTrocar(false)}/>}

      <div style={{ display:"flex" }}>
        <Sidebar active={active} setActive={setActive} openGroups={openGroups} toggleGroup={toggleGroup} modulo={modulo}/>

        <main style={{ flex:1, padding:"24px 28px", minWidth:0, maxWidth:"calc(100% - 238px)" }}>
          <Breadcrumb items={getBreadcrumb()}/>
          {renderPage()}
        </main>
      </div>

      <div style={{ background:C.govDark, padding:"12px 24px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ color:"rgba(255,255,255,.55)", fontSize:11 }}>
          eSocial Web Geral — Governo Federal © 2026 &nbsp;|&nbsp; 🔧 Modo Simulador — Dados fictícios para fins educacionais
        </div>
        <div style={{ color:"rgba(255,255,255,.4)", fontSize:11 }}>
          Central de Atendimento: 0800 730 0888 &nbsp;|&nbsp; gov.br/esocial
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <div>
      <h1>Sistema eSocial</h1>
      <p>Aplicação funcionando direto do GitHub.</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
